spring.application.name=wikimedia-kafka-consumer
spring.main.web-application-type=none

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=wikimedia-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Commit offsets after each poll batch is fully processed
spring.kafka.listener.ack-mode=BATCH
# Number of records returned per poll (determines batch size for BATCH ack-mode)
spring.kafka.consumer.max-poll-records=500
# How long the consumer blocks waiting for records on each poll (ms)
spring.kafka.listener.poll-timeout=3000
